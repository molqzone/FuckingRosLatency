name: ROS2 Iceoryx Image Latency Benchmark

on:
  workflow_dispatch: {}
  push:
    branches: [ master ]
    paths:
      - ".github/workflows/test.yml"
      - "auto_bench_image_latency.sh"
      - "auto_bench_libxr_image_latency.sh"
      - "src/**"
  pull_request:
    paths:
      - ".github/workflows/test.yml"
      - "auto_bench_image_latency.sh"
      - "auto_bench_libxr_image_latency.sh"
      - "src/**"

jobs:
  bench:
    runs-on: ubuntu-22.04

    env:
      ROS_DISTRO: humble
      WS: ${{ github.workspace }}/ros2_ws

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install ROS2 Humble and tools
        run: |
          set -eo pipefail
          sudo apt-get update
          sudo apt-get install -y curl gnupg2 lsb-release

          sudo curl -sSL https://raw.githubusercontent.com/ros/rosdistro/master/ros.key \
            -o /usr/share/keyrings/ros-archive-keyring.gpg

          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/ros-archive-keyring.gpg] \
          http://packages.ros.org/ros2/ubuntu $(lsb_release -cs) main" \
          | sudo tee /etc/apt/sources.list.d/ros2.list > /dev/null

          sudo apt-get update
          sudo apt-get install -y \
            ros-humble-ros-base \
            ros-humble-iceoryx-posh \
            ros-humble-iceoryx-binding-c \
            python3-colcon-common-extensions \
            python3-rosdep \
            build-essential \
            cmake \
            git \
            sysstat \
            pkg-config \
            libudev-dev \
            libwpa-client-dev \
            libnm-dev

          sudo rosdep init || true
          rosdep update

      - name: Prepare workspace
        run: |
          set -eo pipefail
          mkdir -p "$WS/src"

          cp -r src/image_latency_test "$WS/src/"
          cp -r src/libxr_bench "$WS/src/"

          git clone --depth 1 --branch humble https://github.com/ros2/rmw_iceoryx.git "$WS/src/rmw_iceoryx"

          cd "$WS/src/libxr_bench"
          git clone --depth 1 https://github.com/Jiu-xiao/libxr.git libxr

          cd "$WS"
          cp "${GITHUB_WORKSPACE}/auto_bench_image_latency.sh" .
          cp "${GITHUB_WORKSPACE}/auto_bench_libxr_image_latency.sh" .
          chmod +x ./auto_bench_image_latency.sh
          chmod +x ./auto_bench_libxr_image_latency.sh

      - name: Build workspace (rmw_iceoryx_cpp + benchmarks)
        run: |
          set -eo pipefail
          source /opt/ros/${ROS_DISTRO}/setup.bash
          cd "$WS"
          rosdep install --from-paths src --ignore-src --rosdistro ${ROS_DISTRO} -y
          colcon build --cmake-args -DCMAKE_BUILD_TYPE=Release --packages-select rmw_iceoryx_cpp image_latency_test libxr_bench

      - name: Check iceoryx daemon binary
        run: |
          set -eo pipefail
          source /opt/ros/${ROS_DISTRO}/setup.bash
          source "$WS/install/setup.bash"
          command -v iox-roudi

      - name: Run ROS benchmark (iceoryx) 1440x1080
        run: |
          set -eo pipefail
          source /opt/ros/${ROS_DISTRO}/setup.bash
          source "$WS/install/setup.bash"
          cd "$WS"
          RMW_IMPLEMENTATION=rmw_iceoryx_cpp DURATION=10 ./auto_bench_image_latency.sh

      - name: Run ROS benchmark (iceoryx) 320x240
        run: |
          set -eo pipefail
          source /opt/ros/${ROS_DISTRO}/setup.bash
          source "$WS/install/setup.bash"
          cd "$WS"
          RMW_IMPLEMENTATION=rmw_iceoryx_cpp DURATION=10 WIDTH=320 HEIGHT=240 ./auto_bench_image_latency.sh

      - name: Run LibXR image latency test
        run: |
          set -eo pipefail
          source /opt/ros/${ROS_DISTRO}/setup.bash
          cd "$WS"
          ./auto_bench_libxr_image_latency.sh

      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: image-latency-logs
          path: ${{ env.WS }}/logs
